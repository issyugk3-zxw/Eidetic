<svg width="960" height="320" viewBox="0 0 960 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Card background -->
    <linearGradient id="card-bg" x1="14" y1="14" x2="946" y2="306" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8F6FF"/>
    </linearGradient>

    <!-- Gradient bar under tagline -->
    <linearGradient id="violet-bar" x1="0" y1="0" x2="490" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DCCEFF"/>
      <stop offset="0.45" stop-color="#C7B0FF"/>
      <stop offset="1"    stop-color="#B799FF"/>
    </linearGradient>

    <!-- Card shadow -->
    <filter id="card-shadow" x="-3%" y="-6%" width="106%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="18"
                    flood-color="#C5B2FF" flood-opacity="0.38"/>
    </filter>

  </defs>

  <!-- ── Card ── -->
  <g filter="url(#card-shadow)">
    <rect x="14" y="14" width="932" height="292" rx="28"
          fill="url(#card-bg)" stroke="#E5DEFF" stroke-width="1.5"/>
  </g>

  <!-- ── Icon area: light lavender tile, no dark fill ── -->
  <g transform="translate(44,50)">
    <rect x="0" y="0" width="220" height="220" rx="36"
          fill="#F5F1FF" stroke="#E0D5FF" stroke-width="1.5"/>

    <!--
      Mark: 6-arm radial knowledge graph.
      Center (110,110).  Primary arms r=90.  Midpoints r=55.  Branches len=38.

      All coordinates in local space (before translate).
      Colors are mid-to-dark violet for readability on a light background.
    -->

    <!-- Soft hub glow behind center node -->
    <circle cx="110" cy="110" r="52"
            fill="#DDD5FF" fill-opacity="0.45"/>

    <!-- Inner connecting hexagon (midpoints at r=55) -->
    <polygon
      points="165,110 138,62 82,62 55,110 82,158 138,158"
      fill="none" stroke="#C2AEFF" stroke-width="1.2" stroke-opacity="0.55"/>

    <!-- ── 6 primary arms (r=90) ── -->
    <line x1="110" y1="110" x2="200" y2="110" stroke="#8B68CC" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="110" y1="110" x2="155" y2="32"  stroke="#8B68CC" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="110" y1="110" x2="65"  y2="32"  stroke="#8B68CC" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="110" y1="110" x2="20"  y2="110" stroke="#8B68CC" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="110" y1="110" x2="65"  y2="188" stroke="#8B68CC" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="110" y1="110" x2="155" y2="188" stroke="#8B68CC" stroke-width="2.8" stroke-linecap="round"/>

    <!-- ── Secondary branches (from arm midpoints, length 38, ±60° from arm) ── -->
    <!-- Arm 0°,   mid (165,110) -->
    <line x1="165" y1="110" x2="184" y2="77"  stroke="#A88FD4" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="165" y1="110" x2="184" y2="143" stroke="#A88FD4" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Arm 60°,  mid (138,62) -->
    <line x1="138" y1="62"  x2="176" y2="62"  stroke="#A88FD4" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="138" y1="62"  x2="119" y2="29"  stroke="#A88FD4" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Arm 120°, mid (82,62) -->
    <line x1="82"  y1="62"  x2="44"  y2="62"  stroke="#A88FD4" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="82"  y1="62"  x2="101" y2="29"  stroke="#A88FD4" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Arm 180°, mid (55,110) -->
    <line x1="55"  y1="110" x2="36"  y2="77"  stroke="#A88FD4" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="55"  y1="110" x2="36"  y2="143" stroke="#A88FD4" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Arm 240°, mid (82,158) -->
    <line x1="82"  y1="158" x2="44"  y2="158" stroke="#A88FD4" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="82"  y1="158" x2="101" y2="191" stroke="#A88FD4" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Arm 300°, mid (138,158) -->
    <line x1="138" y1="158" x2="176" y2="158" stroke="#A88FD4" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="138" y1="158" x2="119" y2="191" stroke="#A88FD4" stroke-width="1.8" stroke-linecap="round"/>

    <!-- ── Primary tip nodes (r=90) ── -->
    <circle cx="200" cy="110" r="7"   fill="#7B5FC0"/>
    <circle cx="155" cy="32"  r="7"   fill="#7B5FC0"/>
    <circle cx="65"  cy="32"  r="7"   fill="#7B5FC0"/>
    <circle cx="20"  cy="110" r="7"   fill="#7B5FC0"/>
    <circle cx="65"  cy="188" r="7"   fill="#7B5FC0"/>
    <circle cx="155" cy="188" r="7"   fill="#7B5FC0"/>

    <!-- ── Secondary tip nodes ── -->
    <circle cx="184" cy="77"  r="4.5" fill="#A88FD4"/>
    <circle cx="184" cy="143" r="4.5" fill="#A88FD4"/>
    <circle cx="176" cy="62"  r="4.5" fill="#A88FD4"/>
    <circle cx="119" cy="29"  r="4.5" fill="#A88FD4"/>
    <circle cx="44"  cy="62"  r="4.5" fill="#A88FD4"/>
    <circle cx="101" cy="29"  r="4.5" fill="#A88FD4"/>
    <circle cx="36"  cy="77"  r="4.5" fill="#A88FD4"/>
    <circle cx="36"  cy="143" r="4.5" fill="#A88FD4"/>
    <circle cx="44"  cy="158" r="4.5" fill="#A88FD4"/>
    <circle cx="101" cy="191" r="4.5" fill="#A88FD4"/>
    <circle cx="176" cy="158" r="4.5" fill="#A88FD4"/>
    <circle cx="119" cy="191" r="4.5" fill="#A88FD4"/>

    <!-- ── Hub node (center) ── -->
    <circle cx="110" cy="110" r="15"  fill="#7B5FC0"/>
    <circle cx="110" cy="110" r="8"   fill="white"/>

  </g>

  <!-- ── Wordmark ── -->
  <g transform="translate(304,86)" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">

    <text x="0" y="82" fill="#3F2F63"
          font-size="88" font-weight="700" letter-spacing="3">EIDETIC</text>

    <text x="2" y="122" fill="#7A63A8"
          font-size="22" font-weight="400">Plug-and-Play Memory Fabric for AI Agents</text>

    <!-- Gradient underline -->
    <rect x="2" y="135" width="490" height="5" rx="2.5" fill="url(#violet-bar)"/>

    <!-- Backend badges -->
    <g font-size="13" font-weight="600">
      <rect x="2"   y="152" width="78"  height="26" rx="13" fill="#EEE8FF"/>
      <text x="41"  y="170" fill="#6B4FAE" text-anchor="middle">Letta</text>

      <rect x="88"  y="152" width="108" height="26" rx="13" fill="#EEE8FF"/>
      <text x="142" y="170" fill="#6B4FAE" text-anchor="middle">GraphRAG</text>

      <rect x="204" y="152" width="98"  height="26" rx="13" fill="#EEE8FF"/>
      <text x="253" y="170" fill="#6B4FAE" text-anchor="middle">LightRAG</text>

      <rect x="310" y="152" width="108" height="26" rx="13" fill="#EEE8FF"/>
      <text x="364" y="170" fill="#6B4FAE" text-anchor="middle">HippoRAG</text>

      <rect x="426" y="152" width="72"  height="26" rx="13" fill="#E4DCFF"/>
      <text x="462" y="170" fill="#5A3A9E" text-anchor="middle">SQLite</text>
    </g>

  </g>
</svg>
